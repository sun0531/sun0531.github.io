<script>
// ===================================================================
// 核心逻辑 - 体彩优先，备用The Odds API过滤
// ===================================================================

// 体彩接口（支持JSONP）
const SPORTTERY_API = 'https://webapi.sporttery.cn/gateway/api/football/getMatchList';
// The Odds API Key（备用）
const API_KEY = 'f74ecb2f05a3b0263522a21119a9635a';
const ODDS_URL = `https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h&dateFormat=iso`;

// 体彩常见联赛关键词（用于过滤The Odds API结果）
const LOTTERY_LEAGUES = [
    'uefa champions league',
    'epl', 'premier league',
    'la liga',
    'bundesliga',
    'serie a',
    'ligue 1',
    'eredivisie',

    'mls',

    'csl',
    'fifa world cup',
    'euro',
    'copa america',
    'africa cup of nations',
    'ucl',
    'europa league',
    'conference league',
    'brazil serie a',
    'argentina liga',
    'mexico liga mx',
    'turkey super lig',
    'russia premier league',
    'belgium pro league',
    'scotland premiership',
    'switzerland super league',
    'austria bundesliga',
    'denmark superliga',
    'norway eliteserien',
    'sweden allsvenskan',
    'finland veikkausliiga'
];

let allMatches = [];
let trackedBets = [];
let modelParams = {};
let currentTrackMatch = null;
let currentResultMatchId = null;

// ===================================================================
// 数据存储
// ===================================================================
function loadData() {
    try {
        const data = localStorage.getItem('fb_v4_data');
        if (data) {
            const parsed = JSON.parse(data);
            trackedBets = parsed.trackedBets || [];
            modelParams = parsed.modelParams || getDefaultParams();
        } else {
            modelParams = getDefaultParams();
        }
    } catch(e) { trackedBets = []; modelParams = getDefaultParams(); }
}

function saveData() {
    try {
        localStorage.setItem('fb_v4_data', JSON.stringify({
            trackedBets: trackedBets,
            modelParams: modelParams
        }));
    } catch(e) {}
}

function getDefaultParams() {
    return {
        weight_market: 0.30,
        weight_poisson: 0.20,
        weight_form: 0.15,
        weight_h2h: 0.10,
        weight_injury: 0.10,
        weight_odds_velocity: 0.10,
        weight_euro_asia: 0.05,
        home_advantage: 1.25,
        league_avg_goals: 1.35,
        learning_rate: 0.02,
        total_predictions: 0,
        total_hits: 0
    };
}

// ===================================================================
// 预测引擎（与之前相同，简略）
// ===================================================================
function calcProb(h, d, a) {
    if (h <= 0 || a <= 0) return { home: 0, draw: 0, away: 0 };
    const ih = 1/h, id = d > 0 ? 1/d : 0, ia = 1/a;
    const over = ih + id + ia;
    if (over === 0) return { home: 0, draw: 0, away: 0 };
    const vig = 1 / over;
    return {
        home: Math.round(ih * vig * 1000) / 1000,
        draw: Math.round(id * vig * 1000) / 1000,
        away: Math.round(ia * vig * 1000) / 1000
    };
}

function poissonGoals(lambda, maxGoals) {
    const probs = [];
    const e = Math.exp(-lambda);
    for (let k = 0; k <= maxGoals; k++) {
        let p = e;
        for (let i = 1; i <= k; i++) {
            p *= (lambda / i);
        }
        probs.push(p);
    }
    return probs;
}

function calcExpectedGoals(homeAttack, homeDefense, awayAttack, awayDefense, homeAdvantage, leagueAvg) {
    const homeXG = homeAttack * awayDefense * homeAdvantage * leagueAvg / 1.35;
    const awayXG = awayAttack * homeDefense * leagueAvg / 1.35;
    return { home: homeXG, away: awayXG };
}

function calcScoreMatrix(lambdaHome, lambdaAway, maxGoals) {
    const homeProbs = poissonGoals(lambdaHome, maxGoals);
    const awayProbs = poissonGoals(lambdaAway, maxGoals);
    const matrix = [];
    for (let i = 0; i <= maxGoals; i++) {
        for (let j = 0; j <= maxGoals; j++) {
            matrix.push({
                home: i,
                away: j,
                prob: homeProbs[i] * awayProbs[j]
            });
        }
    }
    return matrix;
}

function calcOverUnder(matrix, threshold) {
    let over = 0, under = 0;
    for (const m of matrix) {
        const total = m.home + m.away;
        if (total > threshold) over += m.prob;
        else under += m.prob;
    }
    return { over: over, under: under };
}

function calcBothScore(matrix) {
    let both = 0, notBoth = 0;
    for (const m of matrix) {
        if (m.home > 0 && m.away > 0) both += m.prob;
        else notBoth += m.prob;
    }
    return { both: both, notBoth: notBoth };
}

function predictMatch(matchData, manualData) {
    const odds = matchData.odds;
    const prob = calcProb(odds.home, odds.draw, odds.away);
    let dispersion = { home: 0, draw: 0, away: 0 };
    if (matchData.bookmakers && matchData.bookmakers.length > 1) {
        const oddsList = matchData.bookmakers.map(b => {
            const mk = b.markets.find(m => m.key === 'h2h');
            if (!mk) return null;
            const outcomes = mk.outcomes;
            const h = outcomes.find(o => o.name === matchData.home)?.price || 0;
            const d = outcomes.find(o => o.name === 'Draw')?.price || 0;
            const a = outcomes.find(o => o.name === matchData.away)?.price || 0;
            return { home: h, draw: d, away: a };
        }).filter(o => o && o.home > 0);
        if (oddsList.length > 1) {
            const n = oddsList.length;
            const avg = { home: 0, draw: 0, away: 0 };
            for (const o of oddsList) {
                avg.home += o.home / n;
                avg.draw += o.draw / n;
                avg.away += o.away / n;
            }
            let varHome = 0, varDraw = 0, varAway = 0;
            for (const o of oddsList) {
                varHome += Math.pow(o.home - avg.home, 2) / n;
                varDraw += Math.pow(o.draw - avg.draw, 2) / n;
                varAway += Math.pow(o.away - avg.away, 2) / n;
            }
            dispersion = {
                home: avg.home > 0 ? (Math.sqrt(varHome) / avg.home) * 100 : 0,
                draw: avg.draw > 0 ? (Math.sqrt(varDraw) / avg.draw) * 100 : 0,
                away: avg.away > 0 ? (Math.sqrt(varAway) / avg.away) * 100 : 0
            };
        }
    }
    
    let completeness = 0;
    if (odds.home > 0 && odds.draw > 0 && odds.away > 0) completeness += 30;
    if (matchData.bookmakers && matchData.bookmakers.length > 3) completeness += 20;
    if (manualData && manualData.homeGoals > 0) completeness += 15;
    if (manualData && manualData.h2h) completeness += 15;
    if (manualData && manualData.events) completeness += 10;
    completeness = Math.min(completeness, 100);
    
    const marketDir = prob.home > prob.away ? (prob.home > prob.draw ? '主胜' : '平局') : (prob.away > prob.draw ? '客胜' : '平局');
    const marketScore = Math.max(prob.home, prob.draw, prob.away);
    
    let homeXG = 1.4, awayXG = 1.2;
    if (manualData && manualData.homeGoals > 0) {
        const hAttack = manualData.homeGoals / 1.35;
        const hDefense = manualData.homeConceded / 1.35;
        const aAttack = manualData.awayGoals / 1.35;
        const aDefense = manualData.awayConceded / 1.35;
        const xg = calcExpectedGoals(hAttack, hDefense, aAttack, aDefense, modelParams.home_advantage, modelParams.league_avg_goals);
        homeXG = xg.home;
        awayXG = xg.away;
    }
    
    const maxGoals = 6;
    const matrix = calcScoreMatrix(homeXG, awayXG, maxGoals);
    const overUnder25 = calcOverUnder(matrix, 2.5);
    const bothScore = calcBothScore(matrix);
    const sortedMatrix = matrix.sort((a, b) => b.prob - a.prob);
    const topScores = sortedMatrix.slice(0, 5);
    const totalXG = homeXG + awayXG;
    const goalsDir = totalXG >= 2.8 ? '大球倾向' : (totalXG >= 2.0 ? '2-3球' : '小球倾向');
    
    const poissonProbs = calcProb(1/homeXG, 1/(homeXG+awayXG), 1/awayXG);
    const fusedProb = {
        home: prob.home * 0.5 + poissonProbs.home * 0.5,
        draw: prob.draw * 0.5 + poissonProbs.draw * 0.5,
        away: prob.away * 0.5 + poissonProbs.away * 0.5
    };
    const sum = fusedProb.home + fusedProb.draw + fusedProb.away;
    if (sum > 0) {
        fusedProb.home /= sum;
        fusedProb.draw /= sum;
        fusedProb.away /= sum;
    }
    const sorted = Object.entries(fusedProb).sort((a, b) => b[1] - a[1]);
    const first = sorted[0];
    const second = sorted[1];
    const directionMap = { home: '主胜', draw: '平局', away: '客胜' };
    const primary = directionMap[first[0]] || '主胜';
    const secondary = directionMap[second[0]] || '平局';
    let grade = 'C';
    if (first[1] >= 0.45) grade = 'A';
    else if (first[1] >= 0.35) grade = 'B';
    else grade = 'C';
    const confidence = first[1];
    
    return {
        market: { prob: prob, direction: marketDir, score: marketScore, dispersion: dispersion, completeness: completeness },
        goals: { homeXG, awayXG, totalXG, over25: overUnder25.over, under25: overUnder25.under, bothScore: bothScore.both, topScores, direction: goalsDir },
        fused: { prob: fusedProb, primary, secondary, grade, confidence },
        timestamp: new Date().toISOString()
    };
}

// ===================================================================
// 数据获取 - 体彩优先
// ===================================================================
function fetchSportteryData() {
    return new Promise((resolve, reject) => {
        const callbackName = 'sporttery_callback_' + Date.now();
        const script = document.createElement('script');
        const timeout = setTimeout(() => {
            cleanup();
            reject(new Error('体彩接口超时'));
        }, 8000);
        window[callbackName] = function(response) {
            cleanup();
            try {
                // 体彩返回结构：{ status: 0, data: { matchList: [...] } }
                const matches = response?.data?.matchList || [];
                if (matches.length === 0) {
                    reject(new Error('体彩今日无赛事'));
                    return;
                }
                // 转换为统一格式
                const formatted = matches.map(m => ({
                    id: m.matchId || 'm_' + Math.random().toString(36).substr(2, 9),
                    sport_title: m.leagueName || '未知联赛',
                    home_team: m.homeTeamName || '主队',
                    away_team: m.awayTeamName || '客队',
                    commence_time: m.matchTime || new Date().toISOString(),
                    bookmakers: [{
                        key: 'sporttery',
                        title: '中国体彩',
                        markets: [{
                            key: 'h2h',
                            outcomes: [
                                { name: m.homeTeamName, price: m.homeWinOdds || 0 },
                                { name: 'Draw', price: m.drawOdds || 0 },
                                { name: m.awayTeamName, price: m.awayWinOdds || 0 }
                            ]
                        }]
                    }]
                }));
                resolve(formatted);
            } catch (e) {
                reject(e);
            }
        };
        const date = new Date().toISOString().slice(0, 10);
        const url = `${SPORTTERY_API}?callback=${callbackName}&date=${date}`;
        script.src = url;
        script.onerror = function() { cleanup(); reject(new Error('体彩脚本加载失败')); };
        document.head.appendChild(script);
        function cleanup() {
            clearTimeout(timeout);
            if (script.parentNode) script.parentNode.removeChild(script);
            delete window[callbackName];
        }
    });
}

// 从The Odds API过滤体彩常见联赛
function filterLotteryMatches(data) {
    return data.filter(m => {
        const title = (m.sport_title || '').toLowerCase();
        // 检查是否包含体彩常见关键词
        return LOTTERY_LEAGUES.some(keyword => title.includes(keyword));
    });
}

async function fetchData() {
    const el = document.getElementById('matchList');
    el.innerHTML = '<div class="loading">⏳ 获取体彩数据...</div>';

    // 1. 尝试体彩接口
    try {
        const data = await fetchSportteryData();
        if (data && data.length > 0) {
            allMatches = data;
            renderMatches();
            updateTrackCount();
            return;
        }
    } catch (e) {
        console.warn('体彩数据获取失败:', e);
    }

    // 2. 备用：The Odds API + 过滤
    try {
        el.innerHTML = '<div class="loading">⏳ 从备用源加载...</div>';
        const resp = await fetch(ODDS_URL);
        if (!resp.ok) throw new Error('备用API请求失败');
        const data = await resp.json();
        const filtered = filterLotteryMatches(data);
        if (filtered.length === 0) {
            el.innerHTML = '<div class="empty">📭 今日体彩无赛事，请稍后查看</div>';
            return;
        }
        allMatches = filtered;
        renderMatches();
        updateTrackCount();
    } catch (e) {
        // 3. 尝试从缓存恢复
        const cached = localStorage.getItem('fb_matches_cache');
        if (cached) {
            try {
                allMatches = JSON.parse(cached);
                renderMatches();
                updateTrackCount();
                el.innerHTML += '<div style="color:#ffc107;font-size:12px;margin-top:8px;">⚠️ 显示缓存数据，可能不是最新</div>';
                return;
            } catch(ce) {}
        }
        el.innerHTML = `<div class="empty">❌ 数据加载失败：${e.message}<br>请检查网络或稍后重试</div>`;
    }
}

// 渲染与交互（与之前基本相同，为了简洁省略部分重复函数）

function renderMatches() {
    const el = document.getElementById('matchList');
    const filterText = document.getElementById('filterLeague').value.toLowerCase();
    let list = allMatches;
    if (filterText) {
        list = list.filter(m => 
            m.sport_title?.toLowerCase().includes(filterText) || 
            m.home_team?.toLowerCase().includes(filterText) || 
            m.away_team?.toLowerCase().includes(filterText)
        );
    }
    if (list.length === 0) {
        el.innerHTML = '<div class="empty">📭 暂无匹配比赛</div>';
        return;
    }
    // 缓存数据
    try { localStorage.setItem('fb_matches_cache', JSON.stringify(list)); } catch(e) {}
    
    let html = '';
    for (const m of list) {
        const bm = m.bookmakers.find(b => b.key === 'pinnacle' || b.key === 'sporttery') || m.bookmakers[0];
        const mk = bm?.markets?.find(k => k.key === 'h2h');
        if (!mk) continue;
        const outcomes = mk.outcomes;
        const home = outcomes.find(o => o.name === m.home_team);
        const away = outcomes.find(o => o.name === m.away_team);
        const draw = outcomes.find(o => o.name === 'Draw');
        if (!home || !away) continue;
        const odds = { home: home.price, draw: draw ? draw.price : 0, away: away.price };
        const tracked = trackedBets.find(t => t.matchId === m.id);
        const isTracked = !!tracked;
        const result = tracked?.result || 'pending';
        const resultText = result === 'win' ? '✅' : result === 'lose' ? '❌' : result === 'draw' ? '⚖️' : '⏳';
        const manualData = tracked ? {
            homeGoals: tracked.homeGoals || 1.6,
            homeConceded: tracked.homeConceded || 1.2,
            awayGoals: tracked.awayGoals || 1.4,
            awayConceded: tracked.awayConceded || 1.3,
            h2h: tracked.h2h || '2胜1平2负',
            events: tracked.events || ''
        } : null;
        const matchData = { home: m.home_team, away: m.away_team, odds: odds, bookmakers: m.bookmakers };
        const pred = predictMatch(matchData, manualData);
        const time = new Date(m.commence_time).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        const gradeClass = pred.fused.grade === 'A' ? 'grade-A' : pred.fused.grade === 'B' ? 'grade-B' : 'grade-C';
        html += `
        <div class="match-card" data-id="${m.id}">
            <div class="top"><span>${m.sport_title || '未知'}</span><span>${time}</span><span>${resultText}</span></div>
            <div class="teams">${m.home_team} <span class="vs">vs</span> ${m.away_team}</div>
            <div class="odds">
                <span class="win">主 ${odds.home.toFixed(2)}</span>
                ${odds.draw > 0 ? `<span class="draw">平 ${odds.draw.toFixed(2)}</span>` : ''}
                <span class="lose">客 ${odds.away.toFixed(2)}</span>
            </div>
            <div class="prediction-box">
                <div class="row"><span class="label">第一层·市场模型</span><span class="value">${pred.market.direction} (${(pred.market.score*100).toFixed(1)}%)</span><span class="value" style="font-size:10px;color:#8899bb;">离散度 ${pred.market.dispersion.home.toFixed(1)}%</span></div>
                <div class="row"><span class="label">第二层·进球模型</span><span class="value blue">xG ${pred.goals.homeXG.toFixed(2)}-${pred.goals.awayXG.toFixed(2)}</span><span class="value">${pred.goals.direction}</span></div>
                <div class="row"><span class="label">综合输出</span><span class="value gold">${pred.fused.primary}</span><span class="value">次选 ${pred.fused.secondary}</span><span class="${gradeClass}">${pred.fused.grade}</span></div>
                <div class="row"><span class="label">参考比分</span><span class="value">${pred.goals.topScores.slice(0,3).map(s => `${s.home}-${s.away}`).join(' / ')}</span></div>
                <div class="row"><span class="label">大小球2.5</span><span class="value">大 ${(pred.goals.over25*100).toFixed(0)}% / 小 ${(pred.goals.under25*100).toFixed(0)}%</span><span class="label">双方进球</span><span class="value">${(pred.goals.bothScore*100).toFixed(0)}%</span></div>
                <div class="row" style="font-size:10px;color:#445566;"><span>数据完整度 ${pred.market.completeness}%</span>${pred.fused.confidence >= 0.45 ? '✅ 高置信' : '⚠️ 中低置信'}</div>
                <div class="progress-bar"><div class="fill" style="width:${pred.market.completeness}%;"></div></div>
                ${manualData && manualData.events ? `<div class="row" style="font-size:10px;color:#64b5f6;">📌 ${manualData.events}</div>` : ''}
            </div>
            <div class="actions">
                <button class="track ${isTracked?'active':''}" onclick="toggleTrack('${m.id}')">${isTracked ? '📌 取消' : '📌 追踪'}</button>
                <button onclick="openManualData('${m.id}')">📝 数据</button>
                <button onclick="openResultModal('${m.id}')">📊 复盘</button>
                ${isTracked ? `<button onclick="viewBet('${m.id}')" style="background:#2a4a7a;">📋 详情</button>` : ''}
            </div>
        </div>`;
    }
    el.innerHTML = html;
    updateStats();
}
