<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ 竞彩预测 - API版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0e17;color:#e8edf5;padding:16px;min-height:100vh;}
        .header{display:flex;justify-content:space-between;align-items:center;padding:12px 0 20px;border-bottom:1px solid #1a2744;}
        .header h1{font-size:20px;background:linear-gradient(135deg,#f7931e,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .badge{font-size:10px;color:#8899bb;background:#111d33;padding:4px 12px;border-radius:20px;}
        .stats{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:13px;color:#8899bb;flex-wrap:wrap;gap:6px;}
        .refresh-btn{background:#1a2744;border:none;color:#e8edf5;padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;}
        .refresh-btn:active{background:#2a3a5a;}
        .match-card{background:#111d33;border-radius:12px;padding:16px;margin-bottom:12px;border-left:3px solid #2a4a7a;}
        .match-card .top{display:flex;justify-content:space-between;font-size:12px;color:#8899bb;margin-bottom:8px;flex-wrap:wrap;}
        .match-card .teams{font-size:16px;font-weight:600;margin-bottom:8px;}
        .match-card .teams .vs{color:#8899bb;margin:0 6px;}
        .match-card .odds{display:flex;gap:16px;font-size:14px;margin-bottom:10px;flex-wrap:wrap;}
        .match-card .odds .win{color:#4caf50;}
        .match-card .odds .draw{color:#ffc107;}
        .match-card .odds .lose{color:#f44336;}
        .match-card .prediction{background:#0a1628;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
        .match-card .prediction .dir{font-size:15px;font-weight:600;}
        .match-card .prediction .conf{color:#ffd700;}
        .match-card .prediction .goals{color:#64b5f6;}
        .match-card .prob-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;margin-top:8px;background:#1a2744;}
        .match-card .prob-bar .b-home{background:#4caf50;}
        .match-card .prob-bar .b-draw{background:#ffc107;}
        .match-card .prob-bar .b-away{background:#f44336;}
        .loading,.error,.empty{text-align:center;padding:40px 0;color:#8899bb;}
        .error{color:#f44336;}
        .footer{text-align:center;padding:20px 0 10px;font-size:12px;color:#445566;}
        .debug{background:#1a1a2e;padding:10px;border-radius:6px;font-size:11px;color:#667799;margin-top:10px;word-break:break-all;max-height:200px;overflow:auto;}
    </style>
</head>
<body>
    <div class="header"><h1>⚽ 竞彩预测</h1><span class="badge">The Odds API</span></div>
    <div class="stats"><span>📊 比赛 <strong id="cnt">-</strong></span><span id="time">加载中...</span><button class="refresh-btn" onclick="fetchData()">🔄 刷新</button></div>
    <div id="list"><div class="loading">⏳ 正在加载数据...</div></div>
    <div id="debug" class="debug">⏳ 初始化...</div>
    <div class="footer">数据来源：The Odds API · 仅供研究参考</div>

    <script>
        // ========== 🔑 API Key ==========
        const API_KEY = 'f74ecb2f05a3b0263522a21119a9635a';
        // =================================

        async function fetchData() {
            const listEl = document.getElementById('list');
            const cntEl = document.getElementById('cnt');
            const timeEl = document.getElementById('time');
            const debugEl = document.getElementById('debug');

            listEl.innerHTML = '<div class="loading">⏳ 正在获取数据...</div>';
            cntEl.textContent = '-';
            timeEl.textContent = '请求中...';
            debugEl.textContent = '⏳ 正在请求 API...';

            try {
                const url = `https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h&dateFormat=iso`;
                debugEl.textContent = `📡 请求: ${url}`;

                const resp = await fetch(url);
                debugEl.textContent += `\n✅ 状态: ${resp.status}`;

                if (!resp.ok) {
                    const errText = await resp.text();
                    debugEl.textContent += `\n❌ 错误: ${errText}`;
                    throw new Error(`HTTP ${resp.status}`);
                }

                const data = await resp.json();
                debugEl.textContent += `\n✅ 获取 ${data.length} 场比赛`;

                // 过滤有赔率的比赛
                const matches = data.filter(m => m.bookmakers && m.bookmakers.length > 0);

                if (matches.length === 0) {
                    listEl.innerHTML = '<div class="empty">📭 今日暂无赔率数据</div>';
                    cntEl.textContent = '0';
                    timeEl.textContent = new Date().toLocaleTimeString();
                    return;
                }

                cntEl.textContent = matches.length;
                timeEl.textContent = new Date().toLocaleTimeString();

                let html = '';
                let idx = 0;
                for (const m of matches) {
                    idx++;
                    // 取赔率最好的公司（Pinnacle优先）
                    let bookmaker = m.bookmakers.find(b => b.key === 'pinnacle') || m.bookmakers[0];
                    const market = bookmaker.markets.find(mk => mk.key === 'h2h');
                    if (!market) continue;

                    const outcomes = market.outcomes;
                    const homeOdds = outcomes.find(o => o.name === m.home_team);
                    const awayOdds = outcomes.find(o => o.name === m.away_team);
                    const drawOdds = outcomes.find(o => o.name === 'Draw');

                    if (!homeOdds || !awayOdds) continue;

                    const h = homeOdds.price;
                    const d = drawOdds ? drawOdds.price : 0;
                    const a = awayOdds.price;

                    // 去水概率
                    const prob = calcProb(h, d, a);
                    const direction = getDirection(prob);
                    const confidence = getConfidence(prob);

                    // 时间格式化
                    const matchTime = new Date(m.commence_time);
                    const timeStr = matchTime.toLocaleString('zh-CN', {
                        month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit'
                    });

                    const leagueName = m.sport_title || '未知联赛';
                    const bookmakerName = bookmaker.title || '未知';

                    html += `
                    <div class="match-card">
                        <div class="top">
                            <span>${leagueName}</span>
                            <span>${timeStr}</span>
                        </div>
                        <div class="teams">
                            ${m.home_team} <span class="vs">vs</span> ${m.away_team}
                        </div>
                        <div class="odds">
                            <span class="win">主 ${h.toFixed(2)}</span>
                            ${d > 0 ? `<span class="draw">平 ${d.toFixed(2)}</span>` : ''}
                            <span class="lose">客 ${a.toFixed(2)}</span>
                            <span style="font-size:11px;color:#445566;margin-left:auto;">${bookmakerName}</span>
                        </div>
                        <div class="prediction">
                            <span class="dir">🎯 ${direction}</span>
                            <span class="conf">${confidence}</span>
                            <span class="goals">⚽ 2-3球</span>
                        </div>
                        <div class="prob-bar">
                            <div class="b-home" style="width:${(prob.home*100).toFixed(1)}%;"></div>
                            ${d > 0 ? `<div class="b-draw" style="width:${(prob.draw*100).toFixed(1)}%;"></div>` : ''}
                            <div class="b-away" style="width:${(prob.away*100).toFixed(1)}%;"></div>
                        </div>
                    </div>
                    `;
                }

                listEl.innerHTML = html;
                debugEl.textContent += `\n✅ 渲染完成，共 ${idx} 场`;

            } catch (err) {
                listEl.innerHTML = `<div class="error">❌ 加载失败：${err.message}</div>`;
                timeEl.textContent = '错误';
                debugEl.textContent += `\n❌ 异常: ${err.message}`;
            }
        }

        function calcProb(h, d, a) {
            if (h <= 0 || a <= 0) return { home: 0, draw: 0, away: 0 };
            const ih = 1/h, id_ = d > 0 ? 1/d : 0, ia = 1/a;
            const over = ih + id_ + ia;
            if (over === 0) return { home: 0, draw: 0, away: 0 };
            const vig = 1 / over;
            return {
                home: Math.round(ih * vig * 1000) / 1000,
                draw: Math.round(id_ * vig * 1000) / 1000,
                away: Math.round(ia * vig * 1000) / 1000
            };
        }

        function getDirection(prob) {
            if (prob.home > prob.away && prob.home > prob.draw) {
                return `主胜 (${(prob.home*100).toFixed(1)}%)`;
            }
            if (prob.away > prob.home && prob.away > prob.draw) {
                return `客胜 (${(prob.away*100).toFixed(1)}%)`;
            }
            return `平局 (${(prob.draw*100).toFixed(1)}%)`;
        }

        function getConfidence(prob) {
            const m = Math.max(prob.home, prob.draw, prob.away);
            if (m >= 0.45) return '★★★★★';
            if (m >= 0.38) return '★★★★☆';
            if (m >= 0.32) return '★★★☆☆';
            if (m >= 0.28) return '★★☆☆☆';
            return '★☆☆☆☆';
        }

        // 首次加载
        fetchData();
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
