lass="grade ${a.grade}">${a.grade==='N'?'观察':a.grade+'级'} ${a.score}分</span></div><div class="bar"><i style="width:${a.p[0]*100}%"></i><i style="width:${a.p[1]*100}%"></i><i style="width:${a.p[2]*100}%"></i></div>GX：主 ${a.x.toFixed(2)} · 客 ${a.y.toFixed(2)} · 总 ${(a.x+a.y).toFixed(2)} · ${a.mode}<div class="scores">${a.sc.slice(0,3).map(s=>`<div class="score">${s[1]}:${s[2]}<br>${(s[0]*100).toFixed(1)}%</div>`).join('')}</div>大2.5 ${(a.over*100).toFixed(1)}% · 小2.5 ${(a.under*100).toFixed(1)}% · 2-3球 ${(a.range*100).toFixed(1)}% · BTTS ${(a.btts*100).toFixed(1)}%</div></article>`}function renderToday(){visible=filtered();$('#todayStats').innerHTML=metrics([['筛选赛事',visible.length],['全部赛事',games.length],['A级',visible.filter(x=>x.a.grade==='A').length],['Champion',models.champion.version]]);$('#matches').innerHTML=visible.map(z=>card(z)).join('')||'<div class="empty">当前筛选无赛事</div>'}function renderPicks(){let a=games.map(g=>({g,a:analyze(g)})).filter(z=>z.a.grade==='A');$('#pickStats').innerHTML=metrics([['A级推荐',a.length],['模拟投入',a.length*cfg.stake],['已结算',snaps.filter(x=>x.status==='settled').length],['GX模型','启用']]);$('#pickList').innerHTML=a.map(z=>card(z,true)).join('')||'<div class="empty">暂无A级推荐</div>'}function freezeVisible(){let n=0;for(let z of visible){if(z.a.grade!=='A'||snaps.some(x=>x.id===z.g.id))continue;snaps.push({id:z.g.id,lottery:z.g.lottery,league:z.g.league,home:z.g.home,away:z.g.away,time:z.g.time,createdAt:new Date().toISOString(),odds:z.g.odds,prob:z.a.p,primary:z.a.primary,score:z.a.score,gx:[z.a.x,z.a.y],scorePicks:z.a.sc.slice(0,3).map(s=>`${s[1]}:${s[2]}`),ouPick:z.a.over>=.5?'over':'under',bttsPick:z.a.btts>=.5,selectedOdds:z.a.selectedOdds,stake:cfg.stake,model:models.champion.version,status:'pending'});n++}save();render();alert('固化 '+n+' 场')}function renderSnaps(){$('#snapList').innerHTML=snaps.map(x=>`<div class="card"><div class="top"><span>${esc(x.league)} ${esc(x.lottery)}</span><span>${x.status}</span></div><div class="teams">${esc(x.home)} VS ${esc(x.away)}</div><div class="model">${x.primary} · ${x.score}分 · GX ${x.gx[0].toFixed(2)}:${x.gx[1].toFixed(2)} · 比分 ${x.scorePicks.join('、')} ${x.status==='settled'?`<br>赛果 ${x.hg}:${x.ag} · 盈亏 ${x.profit>=0?'+':''}${x.profit}`:''}</div></div>`).join('')||'<div class="empty">暂无预测快照</div>'}
function settle(results){let a=Array.isArray(results)?results:(results.results||results.matches||[]),n=0;for(let s of snaps.filter(x=>x.status==='pending')){let r=a.find(z=>String(z.id||z.match_id)===s.id||z.lottery_no===s.lottery);if(!r)continue;let hg=+(r.home_goals??r.hg??r.home_score),ag=+(r.away_goals??r.ag??r.away_score);if(!Number.isFinite(hg)||!Number.isFinite(ag))continue;let ix=hg>ag?0:hg===ag?1:2,actual=['主胜','平局','客胜'][ix],hit=s.primary===actual;s.status='settled';Object.assign(s,{hg,ag,actual,hit,profit:hit?s.stake*(s.selectedOdds-1):-s.stake,brier:s.prob.reduce((q,p,i)=>q+(p-(i===ix?1:0))**2,0),logloss:-Math.log(Math.max(s.prob[ix],1e-9)),goalMAE:Math.abs(s.gx[0]+s.gx[1]-(hg+ag)),scoreHit:s.scorePicks.includes(`${hg}:${ag}`),ouHit:(s.ouPick==='over')===(hg+ag>2.5),bttsHit:s.bttsPick===Boolean(hg&&ag)});n++}save();render();alert('结算 '+n+' 场')}function perf(a){if(!a.length)return{n:0,hit:0,roi:0,dd:0,brier:0,logloss:0,mae:0,scoreHit:0,ouHit:0,bttsHit:0};let eq=0,peak=0,dd=0;a.forEach(x=>{eq+=x.profit;peak=Math.max(peak,eq);dd=Math.max(dd,peak-eq)});return{n:a.length,hit:a.filter(x=>x.hit).length/a.length,roi:a.reduce((s,x)=>s+x.profit,0)/a.reduce((s,x)=>s+x.stake,0),dd,brier:a.reduce((s,x)=>s+x.brier,0)/a.length,logloss:a.reduce((s,x)=>s+x.logloss,0)/a.length,mae:a.reduce((s,x)=>s+x.goalMAE,0)/a.length,scoreHit:a.filter(x=>x.scoreHit).length/a.length,ouHit:a.filter(x=>x.ouHit).length/a.length,bttsHit:a.filter(x=>x.bttsHit).length/a.length}}function renderReview(){let a=snaps.filter(x=>x.status==='settled'),p=perf(a);$('#reviewStats').innerHTML=metrics([['已结算',p.n],['命中率',p.n?(p.hit*100).toFixed(1)+'%':'—'],['模拟ROI',p.n?(p.roi*100).toFixed(1)+'%':'—'],['最大回撤',p.dd.toFixed(0)]]);let bins={};a.forEach(x=>{let k=Math.floor(Math.max(...x.prob)*10)*10;(bins[k]??=[]).push(x)});$('#calTable').innerHTML='<tr><th>概率区间</th><th>样本</th><th>预测</th><th>实际</th></tr>'+Object.entries(bins).map(([k,v])=>`<tr><td>${k}-${+k+9}%</td><td>${v.length}</td><td>${(v.reduce((s,x)=>s+Math.max(...x.prob),0)/v.length*100).toFixed(1)}%</td><td>${(v.filter(x=>x.hit).length/v.length*100).toFixed(1)}%</td></tr>`).join('');let g={};a.forEach(x=>(g[x.league]??=[]).push(x));$('#leagueTable').innerHTML='<tr><th>联赛</th><th>样本</th><th>命中</th><th>ROI</th></tr>'+Object.entries(g).map(([k,v])=>{let z=perf(v);return`<tr><td>${esc(k)}</td><td>${z.n}</td><td>${(z.hit*100).toFixed(1)}%</td><td>${(z.roi*100).toFixed(1)}%</td></tr>`}).join('');$('#goalTable').innerHTML='<tr><th>总进球MAE</th><th>比分Top3</th><th>大小2.5</th><th>BTTS</th><th>Brier</th><th>LogLoss</th></tr>'+`<tr><td>${p.n?p.mae.toFixed(3):'—'}</td><td>${p.n?(p.scoreHit*100).toFixed(1)+'%':'—'}</td><td>${p.n?(p.ouHit*100).toFixed(1)+'%':'—'}</td><td>${p.n?(p.bttsHit*100).toFixed(1)+'%':'—'}</td><td>${p.n?p.brier.toFixed(3):'—'}</td><td>${p.n?p.logloss.toFixed(3):'—'}</td></tr>`}
function dailyLearn(){let a=snaps.filter(x=>x.status==='settled'),p=perf(a),newN=a.filter(x=>!x.learned).length;a.forEach(x=>x.learned=true);reports.push({date:new Date().toISOString(),newN,...p});if(a.length>=100&&!models.challenger)models.challenger={...models.champion,version:'V8.1-C',status:'testing',xgWeight:Math.min(.7,models.champion.xgWeight+.05),threshold:Math.min(84,models.champion.threshold+1)};save();renderLearn()}function renderLearn(){let a=snaps.filter(x=>x.status==='settled'),p=perf(a),r=reports.at(-1);$('#modelStats').innerHTML=metrics([['Champion',models.champion.version],['样本',a.length],['GX MAE',a.length?p.mae.toFixed(3):'—'],['Challenger',models.challenger?.version||'未生成']]);$('#report').textContent=r?`时间 ${new Date(r.date).toLocaleString()}\n新增样本 ${r.newN}\n累计 ${r.n}\n命中率 ${(r.hit*100).toFixed(1)}%\n模拟ROI ${(r.roi*100).toFixed(1)}%\nBrier ${r.brier.toFixed(3)}\nLog Loss ${r.logloss.toFixed(3)}\n总进球MAE ${r.mae.toFixed(3)}\n最大回撤 ${r.dd.toFixed(0)}`:'至少积累赛果后执行每日学习'}function promote(){if(!models.challenger)return alert('尚未生成Challenger');let a=snaps.filter(x=>x.status==='settled');if(a.length<100)return alert('至少需要100个已结算样本');models.history.push(models.champion);models.champion={...models.challenger,status:'champion'};models.challenger=null;save();render();alert('Challenger已升级')}function rollback(){let x=models.history.pop();if(!x)return alert('无历史模型');models.champion=x;save();render()}function exportData(){let u=URL.createObjectURL(new Blob([JSON.stringify({cfg,games,snaps,models,reports},null,2)],{type:'application/json'})),a=document.createElement('a');a.href=u;a.download='football_ai_v8_data.json';a.click();URL.revokeObjectURL(u)}
function refreshFilters(){let c=$('#countryF').value,l=$('#leagueF').value,cs=[...new Set(games.map(x=>x.country))],ls=[...new Set(games.map(x=>x.league))];$('#countryF').innerHTML='<option value="all">全部国家/地区</option>'+cs.map(x=>`<option>${esc(x)}</option>`).join('');$('#leagueF').innerHTML='<option value="all">全部联赛</option>'+ls.map(x=>`<option>${esc(x)}</option>`).join('');if(cs.includes(c))$('#countryF').value=c;if(ls.includes(l))$('#leagueF').value=l}function resetFilters(){$('#search').value='';['dateF','countryF','typeF','leagueF','gradeF','goalF'].forEach(x=>$('#'+x).value='all');renderToday()}function saveSettings(){cfg={sourceMode:$('#sourceMode').value,worker:$('#worker').value.trim(),target:$('#target').value.trim(),threshold:+$('#threshold').value||78,stake:+$('#stake').value||100,xgWeight:+$('#xgWeight').value};models.champion.threshold=cfg.threshold;models.champion.xgWeight=cfg.xgWeight;save();alert('已保存')}function renderSettings(){$('#sourceMode').value=cfg.sourceMode;$('#worker').value=cfg.worker;$('#target').value=cfg.target;$('#threshold').value=cfg.threshold;$('#stake').value=cfg.stake;$('#xgWeight').value=cfg.xgWeight}function render(){renderToday();renderPicks();renderSnaps();renderReview();renderLearn();renderSettings()}$$('.tab').forEach(x=>x.onclick=()=>{$$('.tab,.page').forEach(y=>y.classList.remove('on'));x.classList.add('on');$('#'+x.dataset.p).classList.add('on');render()});['search','dateF','countryF','typeF','leagueF','gradeF','goalF'].forEach(x=>$('#'+x).oninput=renderToday);$('#matchFile').onchange=async e=>{games=normalize(JSON.parse(await e.target.files[0].text()));save();refreshFilters();render()};$('#resultFile').onchange=async e=>settle(JSON.parse(await e.target.files[0].text()));refreshFilters();render();
</script></body></html>
