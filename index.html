const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],K={set:'zz_v6_set',matches:'zz_v6_matches',samples:'zz_v6_samples',models:'zz_v6_models',reports:'zz_v6_reports'};function read(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}}let set=read(K.set,{sourceMode:'sporttery',sportteryUrl:'',oddsKey:'',regions:'eu',threshold:70,stake:100}),matches=read(K.matches,[]),samples=read(K.samples,[]),reports=read(K.reports,[]),models=read(K.models,{champion:{version:'V6.0',market:.72,poisson:.28,threshold:70,status:'champion'},challenger:null,history:[]}),lastView=[];function save(){localStorage.setItem(K.set,JSON.stringify(set));localStorage.setItem(K.matches,JSON.stringify(matches));localStorage.setItem(K.samples,JSON.stringify(samples));localStorage.setItem(K.models,JSON.stringify(models));localStorage.setItem(K.reports,JSON.stringify(reports))}function esc(x){return String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function log(x){$('#log').textContent+=`${new Date().toLocaleTimeString()} ${x}\n`;$('#log').scrollTop=99999}function apiTime(d){return d.toISOString().replace(/\.\d{3}Z$/,'Z')}function todayKey(d){return new Date(d).toLocaleDateString('zh-CN',{timeZone:'Asia/Shanghai'})}
const CM={argentina:'阿根廷',austria:'奥地利',belgium:'比利时',brazil:'巴西',chile:'智利',china:'中国',denmark:'丹麦',england:'英格兰',finland:'芬兰',france:'法国',germany:'德国',greece:'希腊',italy:'意大利',japan:'日本',korea:'韩国',ireland:'爱尔兰',mexico:'墨西哥',netherlands:'荷兰',norway:'挪威',poland:'波兰',russia:'俄罗斯',spain:'西班牙',scotland:'苏格兰',sweden:'瑞典',switzerland:'瑞士',usa:'美国'};function country(k,t){k=(k+' '+t).toLowerCase();for(let [x,n] of Object.entries(CM))if(k.includes(x))return n;if(k.includes('uefa'))return'欧洲';if(k.includes('conmebol'))return'南美洲';if(k.includes('afc'))return'亚洲';return'其他'}function typeOf(k,t){let x=(k+' '+t).toLowerCase();if(/qualification|qualifier/.test(x))return'qualification';if(/world.cup|international|nations/.test(x))return'international';if(/uefa|conmebol|afc|champions|libertadores|sudamericana|europa/.test(x))return'continental';if(/cup|pokal|copa/.test(x))return'cup';if(/league|liga|serie|bundesliga|premier|super|mls|allsvenskan|eredivisie/.test(x))return'league';return'other'}
function normalizeJC(p){let a=Array.isArray(p)?p:(p?.data?.matches||p?.data?.value||p?.matches||p?.value||[]);return a.map((m,i)=>{let sp=m.odds||m.had||m.sp||m.hadList||{},h=+(sp.home??sp.h??sp.had_h??m.home_odds??m.had_h),d=+(sp.draw??sp.d??sp.had_d??m.draw_odds??m.had_d),aw=+(sp.away??sp.a??sp.had_a??m.away_odds??m.had_a),league=m.league||m.league_name||m.l_cn_abbr||m.leagueName||'竞彩',time=m.commence_time||m.match_time||m.matchDate||m.start_time;if(!(h&&d&&aw&&time))return null;let sk=m.sport_key||m.league_key||league;return{id:String(m.id||m.match_id||m.matchId||`${time}-${i}`),lotteryNo:m.lottery_no||m.issue_num||m.match_num||m.num||m.matchNum||'',league,home:m.home_team||m.home_name||m.h_cn||m.homeTeam,away:m.away_team||m.away_name||m.a_cn||m.awayTeam,time,odds:[h,d,aw],handicap:m.handicap??m.goal_line??m.hhad?.goal_line??'',hhad:m.hhad||null,country:m.country||country(sk,league),eventType:m.eventType||typeOf(sk,league),source:'sporttery',official:true,companies:1,dispersion:0,dataQuality:70}}).filter(Boolean)}
async function fetchJSON(url,opt){let r=await fetch(url,opt),t=await r.text(),j;try{j=JSON.parse(t)}catch{throw Error(`非JSON响应 ${t.slice(0,80)}`)}if(!r.ok)throw Error(`HTTP ${r.status}: ${j.message||j.error||''}`);return j}async function fetchJC(){if(!set.sportteryUrl)throw Error('未设置体彩JSON接口地址');return normalizeJC(await fetchJSON(set.sportteryUrl))}async function fetchIntl(){if(!set.oddsKey)throw Error('未设置The Odds API Key');let catalog=await fetchJSON(`https://api.the-odds-api.com/v4/sports/?apiKey=${encodeURIComponent(set.oddsKey)}`),sports=catalog.filter(x=>(x.key+x.group).toLowerCase().includes('soccer')&&!x.has_outrights),n=new Date(),from=apiTime(new Date(n.getFullYear(),n.getMonth(),n.getDate())),to=apiTime(new Date(n.getFullYear(),n.getMonth(),n.getDate()+4)),out=[];for(let s of sports){try{let u=`https://api.the-odds-api.com/v4/sports/${s.key}/odds/?apiKey=${encodeURIComponent(set.oddsKey)}&regions=${encodeURIComponent(set.regions)}&markets=h2h&oddsFormat=decimal&dateFormat=iso&commenceTimeFrom=${from}&commenceTimeTo=${to}`,a=await fetchJSON(u);out.push(...a)}catch(e){log(`${s.key}: ${e.message}`);if(e.message.includes('429'))break}}return out.map(e=>{let bs=[];for(let b of e.bookmakers||[]){let h=b.markets?.find(x=>x.key==='h2h');if(!h)continue;let o=Object.fromEntries(h.outcomes.map(x=>[x.name,x.price]));if(o[e.home_team]&&o.Draw&&o[e.away_team])bs.push([o[e.home_team],o.Draw,o[e.away_team]])}if(!bs.length)return null;let odds=[0,1,2].map(i=>bs.reduce((s,x)=>s+x[i],0)/bs.length),disp=bs.reduce((s,x)=>s+x.reduce((z,v,i)=>z+Math.abs(v-odds[i]),0),0)/(bs.length*3);return{id:e.id,league:e.sport_title,home:e.home_team,away:e.away_team,time:e.commence_time,odds,country:country(e.sport_key,e.sport_title),eventType:typeOf(e.sport_key,e.sport_title),source:'international',official:false,companies:bs.length,dispersion:disp,dataQuality:55}}).filter(Boolean)}
function sim(a,b){a=String(a||'').toLowerCase().replace(/fc|club|足球俱乐部|\s|[-.'’]/g,'');b=String(b||'').toLowerCase().replace(/fc|club|足球俱乐部|\s|[-.'’]/g,'');if(a===b||a.includes(b)||b.includes(a))return 1;return [...new Set(a)].filter(x=>b.includes(x)).length/Math.max(a.length,b.length)}function fuse(jc,intl){return jc.map(j=>{let x=intl.find(v=>Math.abs(new Date(v.time)-new Date(j.time))<12*3600000&&sim(j.home,v.home)>.45&&sim(j.away,v.away)>.45);if(!x)return j;return{...j,international:x,companies:x.companies,dispersion:x.dispersion,dataQuality:90}})}
async function refreshAll(){log('开始刷新');let jc=[],it=[],mode=set.sourceMode;try{if(mode!=='international'){jc=await fetchJC();log(`体彩主源 ${jc.length}场`)}if(mode!=='sporttery'){it=await fetchIntl();log(`国际赔率 ${it.length}场`)}let fresh=mode==='sporttery'?jc:mode==='international'?it:fuse(jc,it);if(fresh.length){matches=fresh;save()}else log('本轮0场，保留旧缓存');refreshFilters();render()}catch(e){log('刷新失败：'+e.message);render()}}
function fact(n){let x=1;for(let i=2;i<=n;i++)x*=i;return x}function poi(l,k){return Math.exp(-l)*l**k/fact(k)}function analyze(m){let ip=m.odds.map(x=>1/x),sum=ip.reduce((a,b)=>a+b),market=ip.map(x=>x/sum),str=(market[0]-market[2])*.9,lh=Math.max(.3,2.5*(.5+str/2)),la=Math.max(.3,2.5-lh),pp=[0,0,0],sc=[],gg=Array(9).fill(0);for(let h=0;h<9;h++)for(let a=0;a<9;a++){let v=poi(lh,h)*poi(la,a);pp[h>a?0:h===a?1:2]+=v;sc.push([v,h,a]);gg[h+a]=(gg[h+a]||0)+v}let ps=pp.reduce((a,b)=>a+b),p=market.map((x,i)=>models.champion.market*x+models.champion.poisson*pp[i]/ps),s=p.reduce((a,b)=>a+b);p=p.map(x=>x/s);let r=[0,1,2].sort((a,b)=>p[b]-p[a]),labels=['主胜','平局','客胜'],gap=p[r[0]]-p[r[1]],score=Math.round(45+Math.min(22,gap*150)+Math.min(12,m.companies*1.5)+m.dataQuality*.15-Math.min(8,m.dispersion*80));score=Math.max(40,Math.min(96,score));let level=score>=80?'A':score>=70?'B':score>=60?'C':'N';sc.sort((a,b)=>b[0]-a[0]);let goals=gg.map((x,i)=>[x,i]).sort((a,b)=>b[0]-a[0]).slice(0,2).map(x=>x[1]);return{p,primary:labels[r[0]],secondary:labels[r[1]],score,level,odd:m.odds[r[0]],scores:sc.slice(0,3).map(x=>`${x[1]}:${x[2]}`),goals}}
function refreshFilters(){let c=$('#countryFilter').value,l=$('#leagueFilter').value,cs=[...new Set(matches.map(x=>x.country))].sort(),ls=[...new Set(matches.map(x=>x.league))].sort();$('#countryFilter').innerHTML='<option value="all">全部国家/地区</option>'+cs.map(x=>`<option>${esc(x)}</option>`).join('');$('#leagueFilter').innerHTML='<option value="all">全部联赛</option>'+ls.map(x=>`<option>${esc(x)}</option>`).join('');if(cs.includes(c))$('#countryFilter').value=c;if(ls.includes(l))$('#leagueFilter').value=l}function filtered(){let q=$('#keyword').value.toLowerCase(),date=$('#dateFilter').value,c=$('#countryFilter').value,t=$('#typeFilter').value,l=$('#leagueFilter').value,lv=$('#levelFilter').value,now=new Date(),today=todayKey(now),tom=todayKey(new Date(now.getTime()+86400000));return matches.map(m=>({m,a:analyze(m)})).filter(x=>(x.m.lotteryNo+x.m.league+x.m.home+x.m.away).toLowerCase().includes(q)).filter(x=>date==='all'||date==='3days'||(date==='today'&&todayKey(x.m.time)===today)||(date==='tomorrow'&&todayKey(x.m.time)===tom)).filter(x=>c==='all'||x.m.country===c).filter(x=>t==='all'||x.m.eventType===t).filter(x=>l==='all'||x.m.league===l).filter(x=>lv==='all'||x.a.level===lv)}
function metrics(a){return a.map(x=>`<div class="metric"><b>${x[1]}</b><small>${x[0]}</small></div>`).join('')}function renderToday(){lastView=filtered();let forms=lastView.filter(x=>x.a.level==='A').length;$('#summary').innerHTML=metrics([['今日赛事',lastView.length],['A级推荐',forms],['已固化',samples.filter(x=>x.status==='pending').length],['模型',models.champion.version]]);$('#matches').innerHTML=lastView.map(({m,a})=>`<article class="match ${a.level}"><div class="match-top"><span>${esc(m.league)} ${m.lotteryNo?'· '+esc(m.lotteryNo):''}</span><span>${new Date(m.time).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</span></div><div class="teams">${esc(m.home)} <span class="vs">VS</span> ${esc(m.away)}</div><div class="odds"><div class="odd home">主胜<b>${m.odds[0].toFixed(2)}</b></div><div class="odd draw">平局<b>${m.odds[1].toFixed(2)}</b></div><div class="odd away">客胜<b>${m.odds[2].toFixed(2)}</b></div></div><div class="recommend"><div class="rec-head"><b>推荐：${a.primary} / ${a.secondary}</b><span class="level ${a.level}">${a.level==='N'?'暂不推荐':a.level+'级'}</span></div><div class="prob"><i style="width:${a.p[0]*100}%"></i><i style="width:${a.p[1]*100}%"></i><i style="width:${a.p[2]*100}%"></i></div><div class="details">模型评分 ${a.score}分 · 参考比分 ${a.scores.join('、')} · 总进球 ${a.goals.join('、')}<br>数据完整度 ${m.dataQuality}% · ${m.international?'体彩+国际赔率增强':'基础赔率模型'}</div></div><div class="source">${m.official?'体彩主源':'国际赔率源'} · ${m.companies}个赔率来源</div></article>`).join('')||'<div class="empty">当前筛选下无赛事</div>'}function renderPicks(){let p=matches.map(m=>({m,a:analyze(m)})).filter(x=>x.a.level==='A'&&x.m.dataQuality>=70);$('#pickSummary').innerHTML=metrics([['AI推荐',p.length],['模拟投入',p.length*set.stake],['已结算',samples.filter(x=>x.status==='settled').length],['Champion',models.champion.version]]);$('#pickList').innerHTML=p.map(x=>`<div class="match A"><b>${esc(x.m.league)} ${esc(x.m.lotteryNo)}</b><div class="teams">${esc(x.m.home)} <span class="vs">VS</span> ${esc(x.m.away)}</div><div class="rec-head"><span>推荐 ${x.a.primary} @${x.a.odd.toFixed(2)}</span><span class="level">A级 ${x.a.score}分</span></div></div>`).join('')||'<div class="empty">暂无A级正式推荐</div>'}
function freezeVisible(){let n=0;for(let {m,a} of lastView){if(a.level!=='A'||samples.some(x=>x.id===m.id))continue;samples.push({id:m.id,lotteryNo:m.lotteryNo,league:m.league,home:m.home,away:m.away,time:m.time,createdAt:new Date().toISOString(),odds:m.odds,prob:a.p,primary:a.primary,score:a.score,level:a.level,selectedOdds:a.odd,stake:set.stake,status:'pending',model:models.champion.version});n++}save();render();alert(`已固化${n}场A级推荐`)}function perf(a){if(!a.length)return{n:0,hit:0,roi:0,brier:0,logloss:0,profit:0,maxDD:0};let eq=0,peak=0,dd=0;a.forEach(x=>{eq+=x.profit;peak=Math.max(peak,eq);dd=Math.max(dd,peak-eq)});return{n:a.length,hit:a.filter(x=>x.hit).length/a.length,roi:a.reduce((s,x)=>s+x.profit,0)/a.reduce((s,x)=>s+x.stake,0),brier:a.reduce((s,x)=>s+x.brier,0)/a.length,logloss:a.reduce((s,x)=>s+x.logloss,0)/a.length,profit:a.reduce((s,x)=>s+x.profit,0),maxDD:dd}}function renderReview(){let a=samples.filter(x=>x.status==='settled'),p=perf(a);$('#reviewSummary').innerHTML=metrics([['已结算',p.n],['命中率',p.n?(p.hit*100).toFixed(1)+'%':'—'],['模拟ROI',p.n?(p.roi*100).toFixed(1)+'%':'—'],['最大回撤',p.maxDD.toFixed(0)]]);let bins={};a.forEach(x=>{let z=Math.max(...x.prob),k=Math.floor(z*10)*10;(bins[k]??=[]).push(x)});$('#calTable').innerHTML='<tr><th>区间</th><th>样本</th><th>预测</th><th>实际</th></tr>'+Object.entries(bins).map(([k,v])=>`<tr><td>${k}-${+k+9}%</td><td>${v.length}</td><td>${(v.reduce((s,x)=>s+Math.max(...x.prob),0)/v.length*100).toFixed(1)}%</td><td>${(v.filter(x=>x.hit).length/v.length*100).toFixed(1)}%</td></tr>`).join('');let g={};a.forEach(x=>(g[x.league]??=[]).push(x));$('#leagueTable').innerHTML='<tr><th>联赛</th><th>场次</th><th>命中</th><th>ROI</th></tr>'+Object.entries(g).map(([k,v])=>{let q=perf(v);return`<tr><td>${esc(k)}</td><td>${q.n}</td><td>${(q.hit*100).toFixed(1)}%</td><td>${(q.roi*100).toFixed(1)}%</td></tr>`}).join('');$('#history').textContent=a.map(x=>`${x.league} ${x.home}-${x.away} ${x.primary} ${x.profit>=0?'+':''}${x.profit}`).join('\n')||'暂无已结算数据'}
function dailyLearn(){let a=samples.filter(x=>x.status==='settled'),p=perf(a),newN=a.filter(x=>!x.learned).length;a.forEach(x=>x.learned=true);reports.push({date:new Date().toISOString(),newN,...p});if(a.length>=100&&!models.challenger)models.challenger={version:'V6.1-C',status:'testing',market:.76,poisson:.24,threshold:72,sample:a.length};save();renderLearn()}function renderLearn(){let a=samples.filter(x=>x.status==='settled'),p=perf(a),r=reports.at(-1);$('#modelSummary').innerHTML=metrics([['Champion',models.champion.version],['训练样本',a.length],['Brier',a.length?p.brier.toFixed(3):'—'],['Challenger',models.challenger?.version||'未生成']]);$('#learnReport').textContent=r?`时间 ${new Date(r.date).toLocaleString()}\n新增 ${r.newN}\n累计 ${r.n}\n命中率 ${(r.hit*100).toFixed(1)}%\nROI ${(r.roi*100).toFixed(1)}%\nBrier ${r.brier.toFixed(3)}\nLog Loss ${r.logloss.toFixed(3)}\n最大回撤 ${r.maxDD.toFixed(0)}`:'至少积累赛后数据后执行每日学习'}function rollback(){let x=models.history.pop();if(!x)return alert('暂无可回退模型');models.champion=x;save();render()}function exportData(){let u=URL.createObjectURL(new Blob([JSON.stringify({samples,reports,models},null,2)],{type:'application/json'})),a=document.createElement('a');a.href=u;a.download='football_ai_v6_data.json';a.click();URL.revokeObjectURL(u)}
function resetFilters(){$('#keyword').value='';$('#dateFilter').value='today';$('#countryFilter').value='all';$('#typeFilter').value='all';$('#leagueFilter').value='all';$('#levelFilter').value='all';renderToday()}function saveSettings(run){set.sourceMode=$('#sourceMode').value;set.sportteryUrl=$('#sportteryUrl').value.trim();set.oddsKey=$('#oddsKey').value.trim();set.regions=$('#regions').value;set.threshold=+$('#threshold').value||70;set.stake=+$('#stake').value||100;models.champion.threshold=set.threshold;save();if(run)refreshAll()}function renderSettings(){$('#sourceMode').value=set.sourceMode;$('#sportteryUrl').value=set.sportteryUrl;$('#oddsKey').value=set.oddsKey;$('#regions').value=set.regions;$('#threshold').value=set.threshold;$('#stake').value=set.stake}function render(){renderToday();renderPicks();renderReview();renderLearn();renderSettings()}$$('.tab').forEach(x=>x.onclick=()=>{$$('.tab,.page').forEach(y=>y.classList.remove('on'));x.classList.add('on');$('#'+x.dataset.page).classList.add('on');render()});['keyword','dateFilter','countryFilter','typeFilter','leagueFilter','levelFilter'].forEach(id=>$('#'+id).oninput=renderToday);$('#jsonFile').onchange=async e=>{try{let a=normalizeJC(JSON.parse(await e.target.files[0].text()));if(!a.length)throw Error('未识别到体彩记录');matches=a;save();refreshFilters();render();alert(`导入${a.length}场`)}catch(x){alert(x.message)}};refreshFilters();render();
</script></body></html>
